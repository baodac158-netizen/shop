<!DOCTYPE html>
<html lang="zh">
    <link rel="stylesheet" href="../Styles/2.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 电商主页</title>
    <link rel="stylesheet" href="../Styles/Styles_ofMain.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../Picture/logo.jpg" alt="上传您的Logo图片" id="logo">
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="../Index.html">首页</a></li>
                <li><a href="../Class2/About_Us.html" target="_blank">关于我们</a></li>
                <li><a href="../Class2/User_Register.html" target="_blank">注册</a></li>
                <li><a href="../Class2/User_Login.html" target="_blank">登录</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="product-detail">
            <h1 id="product-name">商品名称加载中...</h1>
            <img id="product-image" src="" alt="商品图片">
            <p id="product-price">价格加载中...</p>
            <p id="product-desc">商品描述加载中...</p>
            <button class="add-to-cart">添加到购物车</button>
            <a id="more-detail-link" href="#">查看详情</a>

        </section>
    </main>

    <footer>
        <p>&copy; 小组的版权所有。</p>
    </footer>
</body>

<script>
    document.addEventListener('DOMContentLoaded', async function () {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        if (!productId) {
            alert('未指定商品 ID');
            return;
        }

        const res = await fetch(`http://localhost:8080/api/products/${productId}`);
        const product = await res.json();

        document.getElementById('product-name').textContent = product.name;
        document.getElementById('product-price').textContent = `¥${product.price}`;
        document.getElementById('product-image').src = product.imageUrl;
        document.getElementById('product-desc').textContent = product.description;
        document.getElementById('more-detail-link').href = `../Class3/Product_Detail1.${productId}.html`;

    });

</script>

</html>
